<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ft_transcendence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: .5rem; font-family: monospace; color: #fff; }
    #game-container { width: min(100vw, calc((100vh - 4rem) * 800/600)); aspect-ratio: 800/600; border: 1px solid #2a2a2a; }
    canvas#canvas { display: block; width: 100% !important; height: 100% !important; image-rendering: pixelated; }
    #status { font-size: .7rem; color: #444; }
    #status.connected { color: #4caf50; }
    #status.disconnected { color: #f44336; }
  </style>
</head>
<body>
  <div id="game-container"><canvas id="canvas"></canvas></div>
  <div id="status" class="connecting">⬤ Conectando...</div>
  <script src="/js/ws-client.js"></script>
  <script>
    window.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyW','KeyA','KeyS','KeyD','KeyZ','KeyX'].includes(e.code)) e.preventDefault();
    }, { passive: false });
    var Module = { canvas: document.getElementById('canvas') };
  </script>
  <script src="/game.js"></script>
</body>
</html>
