# ============================================================
#  nginx.conf — reverse proxy principal
#
#  Rutas:
#    /        → frontend (HTML + Raylib WASM)
#    /api/*   → backend  (REST API)
#    /ws      → backend  (WebSocket del juego)
# ============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ─── Upstreams ─────────────────────────────────────────
    upstream frontend_service {
        server frontend:80;
    }

    upstream backend_service {
        server backend:3000;
    }

    # ─── Servidor HTTPS ────────────────────────────────────
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Necesario para servir archivos .wasm con el tipo correcto
        types {
            application/wasm wasm;
        }

        # ── Frontend (HTML + WASM) ──────────────────────────
        location / {
            proxy_pass http://frontend_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── API REST del backend ────────────────────────────
        location /api/ {
            proxy_pass http://backend_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket del juego ─────────────────────────────
        # IMPORTANTE: los headers Upgrade son obligatorios para WS
        location /ws {
            proxy_pass http://backend_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout 3600s;   # mantener conexión abierta
            proxy_send_timeout 3600s;
        }
    }

    # Redirigir HTTP → HTTPS (opcional, útil si alguien accede por 80)
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }
}
